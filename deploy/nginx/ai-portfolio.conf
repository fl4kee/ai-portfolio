# /etc/nginx/sites-available/ai-portfolio.conf
# Reverse proxy for the Next.js app (running on 127.0.0.1:3000 via Docker).
#
# 1) Replace example.com with your domain.
# 2) Point an A-record for the domain at this VPS's IP.
# 3) Enable + reload:
#      sudo ln -s /etc/nginx/sites-available/ai-portfolio.conf /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
# 4) Get TLS (certbot rewrites this file to add the 443 block automatically):
#      sudo certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Optional: raise if visitors upload anything later.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # IMPORTANT for the AI chat: stream tokens through instead of buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
